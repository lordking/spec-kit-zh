name: 同步上游仓库

on:
  schedule:
    # 每天 UTC 时间 00:00 运行（北京时间 08:00）
    - cron: "0 0 * * *"
  workflow_dispatch: # 允许手动触发
    inputs:
      target_branch:
        description: "目标分支"
        required: false
        default: "main"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    concurrency:
      group: upstream-sync-${{ github.ref }}
      cancel-in-progress: false
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 添加上游远程仓库
        run: |
          git remote add upstream https://github.com/github/spec-kit.git || true
          git fetch upstream --tags --force

      - name: 读取同步忽略清单
        id: read_syncignore
        run: |
          if [ -f .github/.syncignore ]; then
            # 读取忽略清单，过滤掉注释和空行
            IGNORE_PATTERNS=$(grep -v '^#' .github/.syncignore | grep -v '^$' | tr '\n' '|' | sed 's/|$//')
            echo "patterns=$IGNORE_PATTERNS" >> $GITHUB_OUTPUT
            echo "has_patterns=true" >> $GITHUB_OUTPUT
            echo "读取到的忽略模式: $IGNORE_PATTERNS"
          else
            echo "has_patterns=false" >> $GITHUB_OUTPUT
            echo "未找到 .syncignore 文件"
          fi

      - name: 检查上游变更
        id: check_changes
        run: |
          # 获取当前的 HEAD commit
          CURRENT_COMMIT=$(git rev-parse HEAD)
          echo "current_commit=$CURRENT_COMMIT" >> $GITHUB_OUTPUT

          # 检查是否有上游的新提交需要合并
          # 使用 merge-base 找到共同祖先，然后检查上游是否有新提交
          MERGE_BASE=$(git merge-base HEAD upstream/main)
          UPSTREAM_COMMIT=$(git rev-parse upstream/main)
          echo "upstream_commit=$UPSTREAM_COMMIT" >> $GITHUB_OUTPUT

          if [ "$MERGE_BASE" = "$UPSTREAM_COMMIT" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No upstream changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT

            # 构建 git 排除路径参数
            EXCLUDE_ARGS=""
            if [ "${{ steps.read_syncignore.outputs.has_patterns }}" = "true" ]; then
              # 从 .syncignore 读取模式并转换为 git pathspec 排除参数
              while IFS= read -r pattern; do
                # 跳过注释和空行
                [[ "$pattern" =~ ^#.*$ ]] && continue
                [[ -z "$pattern" ]] && continue
                EXCLUDE_ARGS="$EXCLUDE_ARGS ':!${pattern}'"
              done < .github/.syncignore
            fi

            # 获取上游新提交的变更文件列表（应用忽略清单）
            ALL_CHANGED=$(git diff --name-only $MERGE_BASE upstream/main)
            if [ "${{ steps.read_syncignore.outputs.has_patterns }}" = "true" ]; then
              IGNORE_PATTERN="${{ steps.read_syncignore.outputs.patterns }}"
              CHANGED_FILES=$(echo "$ALL_CHANGED" | grep -vE "($IGNORE_PATTERN)" | head -20)
            else
              CHANGED_FILES="$ALL_CHANGED"
            fi
            echo "changed_files<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT

            # 获取变更统计（应用忽略清单）
            if [ -n "$EXCLUDE_ARGS" ]; then
              STATS=$(eval git diff --stat $MERGE_BASE upstream/main -- . $EXCLUDE_ARGS)
            else
              STATS=$(git diff --stat $MERGE_BASE upstream/main)
            fi
            echo "stats<<EOF" >> $GITHUB_OUTPUT
            echo "$STATS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT

            echo "Upstream changes detected!"
          fi

      - name: 保存完整差异报告
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          mkdir -p sync-report
          git log --oneline --decorate --graph --left-right --cherry-pick --no-merges HEAD...upstream/main > sync-report/commits.txt

          # 构建 git 排除路径参数
          EXCLUDE_ARGS=""
          if [ -f .github/.syncignore ]; then
            while IFS= read -r pattern; do
              [[ "$pattern" =~ ^#.*$ ]] && continue
              [[ -z "$pattern" ]] && continue
              EXCLUDE_ARGS="$EXCLUDE_ARGS ':!${pattern}'"
            done < .github/.syncignore
          fi

          # 生成差异报告（应用忽略清单）
          if [ -n "$EXCLUDE_ARGS" ]; then
            eval git diff HEAD upstream/main -- . $EXCLUDE_ARGS > sync-report/full.diff
            eval git diff --name-status HEAD upstream/main -- . $EXCLUDE_ARGS > sync-report/changed-files.txt
          else
            git diff HEAD upstream/main > sync-report/full.diff
            git diff --name-status HEAD upstream/main > sync-report/changed-files.txt
          fi
        shell: bash

      - name: 上传同步报告
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: upstream-sync-report
          path: sync-report

      - name: 合并上游变更
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          UPSTREAM_COMMIT="${{ steps.check_changes.outputs.upstream_commit }}"
          BRANCH="upstream-sync-${UPSTREAM_COMMIT}"

          # 创建同步分支（避免直接推送到受保护的 main 分支）
          git checkout -b "$BRANCH"

          # 使用 squash 合并上游变更（不创建合并提交，避免违反分支保护规则）
          if git merge --squash --strategy=recursive --strategy-option=theirs upstream/main; then
            # 恢复 .syncignore 中列出的所有本地文件
            if [ -f .github/.syncignore ]; then
              echo "恢复忽略清单中的本地文件..."
              while IFS= read -r pattern; do
                # 跳过注释和空行
                [[ "$pattern" =~ ^#.*$ ]] && continue
                [[ -z "$pattern" ]] && continue

                # 取消暂存上游新增但应被忽略的文件（例如新增的 workflow 文件）
                git diff --name-only --cached --diff-filter=A -- "$pattern" 2>/dev/null | \
                  xargs -r git rm --cached -f -- 2>/dev/null || true

                # 恢复被上游修改或删除的本地文件到 HEAD 版本
                git checkout HEAD -- "$pattern" 2>/dev/null || true
              done < .github/.syncignore
            fi

            if git diff --cached --quiet; then
              echo "merge_status=no_changes" >> $GITHUB_ENV
              echo "同步忽略清单过滤后无实际变更，跳过提交"
            else
              git commit -m "chore: sync upstream changes (${UPSTREAM_COMMIT})"
              git push --set-upstream origin "$BRANCH"
              echo "merge_status=success" >> $GITHUB_ENV
            fi
          else
            # 理论上 --strategy-option=theirs 不应产生冲突，此处仅作安全兜底
            # 清理 squash merge 在工作区留下的残留变更
            git checkout -- . 2>/dev/null || true
            git clean -fd 2>/dev/null || true
            echo "merge_status=conflict" >> $GITHUB_ENV
          fi

      - name: 同步上游标签
        run: |
          # 推送从上游获取的标签到远程仓库
          # --tags 会推送所有不在远程仓库的标签
          git push origin --tags || echo "标签同步失败，但继续执行"

      - name: 创建拉取请求
        if: steps.check_changes.outputs.has_changes == 'true' && env.merge_status == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_COMMIT: ${{ steps.check_changes.outputs.upstream_commit }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          BRANCH="upstream-sync-${UPSTREAM_COMMIT}"
          PR_BODY="$(printf '自动同步自上游仓库 [github/spec-kit](https://github.com/github/spec-kit) 的变更。\n\n- 上游提交：%s\n- 运行详情：%s' "${UPSTREAM_COMMIT}" "${RUN_URL}")"
          gh pr create \
            --title "⬆️ 同步上游变更: ${UPSTREAM_COMMIT}" \
            --body "${PR_BODY}" \
            --base main \
            --head "$BRANCH" \
            --label "upstream-sync" || echo "PR 已存在或创建失败，跳过"

      - name: 渲染汉化待办 issue 模板
        id: render_localization_issue
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          UPSTREAM_COMMIT: ${{ steps.check_changes.outputs.upstream_commit }}
          CURRENT_COMMIT: ${{ steps.check_changes.outputs.current_commit }}
          MERGE_STATUS: ${{ env.merge_status == 'success' && '✅ 成功' || (env.merge_status == 'no_changes' && '✅ 成功（无需提交）') || '⚠️ 冲突（需要手动处理）' }}
          UPDATED_AT: ${{ github.event.repository.updated_at }}
          STATS: ${{ steps.check_changes.outputs.stats }}
          CHANGED_FILES: ${{ steps.check_changes.outputs.changed_files }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          python3 .github/workflows/scripts/render_localization_issue.py

      - name: 创建汉化待办 issue
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: "📝 汉化待办：同步上游仓库变更 (${{ steps.check_changes.outputs.upstream_commit }})"
          content-filepath: .github/workflows/scripts/localization-issue-output.md
          labels: |
            upstream-sync
            localization-todo
            ${{ env.merge_status == 'conflict' && 'merge-conflict' || '' }}
